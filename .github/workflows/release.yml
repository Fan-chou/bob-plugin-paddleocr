name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .bobplugin
        run: |
          PLUGIN_NAME="bob-plugin-paddleocr"
          VERSION="${{ steps.version.outputs.VERSION }}"
          OUTPUT="${PLUGIN_NAME}@${VERSION}.bobplugin"

          # Package required files
          zip -r "$OUTPUT" info.json main.js icon.png

          echo "PLUGIN_NAME=${PLUGIN_NAME}" >> "$GITHUB_ENV"
          echo "OUTPUT=${OUTPUT}" >> "$GITHUB_ENV"
          echo "Built: $OUTPUT"
          unzip -l "$OUTPUT"

      - name: Calculate SHA256
        run: |
          SHA256=$(sha256sum "${{ env.OUTPUT }}" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "SHA256: ${SHA256}"

      - name: Update appcast.json
        run: |
          cat > appcast.json << EOF
          {
            "identifier": "com.fanchou.bob.paddleocr",
            "versions": [
              {
                "version": "${{ steps.version.outputs.VERSION }}",
                "desc": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}",
                "sha256": "${{ env.SHA256 }}",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.OUTPUT }}",
                "minBobVersion": "1.20.0"
              }
            ]
          }
          EOF
          echo "Appcast updated with SHA256: ${{ env.SHA256 }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PaddleOCR ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ env.OUTPUT }}
            appcast.json
